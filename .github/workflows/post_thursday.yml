name: Post Threads (thursday)
on:
  schedule:
    - cron: '0 10 * * 4'
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests gspread google-auth
      - name: Post
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          POSTING_SERVICE: buffer
          DAY: thursday
        run: python scripts/post_threads.py
